<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}IoT Device Security Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <a href="{{ url_for('index') }}" class="brand">
      <span class="logo">&#9678;</span>
      IoT Device Security Analyzer
    </a>
    <nav><a href="{{ url_for('index') }}">New scan</a></nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer>
    <small>For use on networks you own or have explicit permission to test.</small>
  </footer>
</body>
</html>
